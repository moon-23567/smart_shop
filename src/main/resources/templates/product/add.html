<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>新增商品</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body style="padding:20px;">
<div style="background-color:#0d6efd;color:#fff;padding:16px 20px;border-radius:8px;margin-bottom:20px;box-shadow:0 2px 6px #cce0f5;">
    <h4 style="margin:0;font-weight:500;">新增商品</h4>
</div>

<div style="background:#f8f9fa;padding:22px;border-radius:8px;box-shadow:0 1px 4px #e4e7ec;max-width:900px;margin:0 auto;">
    <form th:action="@{/product/add}" method="post" enctype="multipart/form-data" th:object="${product}">
    <div class="mb-3">
            <label style="font-weight:500;">商品名称</label>
            <input name="name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label style="font-weight:500;">商品分类</label>
            <select name="catId" class="form-select">
                <option th:each="c : ${catList}" th:value="${c.id}" th:text="${c.name}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label style="font-weight:500;">商品价格</label>
            <input name="price" class="form-control" type="number" step="0.01" required>
        </div>

        <div class="mb-3">
            <label style="font-weight:500;">商品图片文件名</label>
            <input type="text" class="form-control" name="imgUrl" th:field="*{imgUrl}" placeholder="p1.jpg / p2.jpg">
            <!-- 轻量化小字提示，浅灰、字号更小，不抢视觉 -->
            <div style="font-size:12px;color:#888;margin-top:4px;">仅填写图片文件名，图片已放置在 static/img 目录</div>
            <img th:if="${product.imgUrl != null && product.imgUrl != ''}"
                 th:src="@{/img/}+${product.imgUrl}"
                 width="100"
                 style="margin-top:10px;border-radius:6px;border:1px solid #dee2e6;">
        </div>

        <div class="mb-3">
            <label style="font-weight:500;">发布日期</label>
            <input name="releaseDate" class="form-control" type="date">
        </div>

        <div class="mb-3">
            <label style="font-weight:500;">商品描述</label>
            <textarea name="descp" class="form-control" rows="3" style="vertical-align:middle;"></textarea>
        </div>

        <div style="margin-top:24px;display:flex;gap:12px;">
            <button type="submit" class="btn btn-primary px-4">提交保存</button>
            <a th:href="@{/product/list}" class="btn btn-secondary px-4">返回列表</a>
        </div>
    </form>
</div>
</body>
</html>
