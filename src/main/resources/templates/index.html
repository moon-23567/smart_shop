<!DOCTYPE html>
<html lang="zh-CN" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>商品管理后台</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }

        body {
            background: #f0f4fc;
        }

        .top-header {
            height: 64px;
            background: linear-gradient(90deg, #0f3460, #1a407c);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            color: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        }

        .header-title {
            font-size: 18px;
            font-weight: 500;
        }

        .user-info {
            display: flex;
            align-items: center;
        }

        .user-info span {
            margin-right: 12px;
        }

        .logout-btn {
            color: #fff;
            text-decoration: none;
            padding: 6px 16px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            transition: 0.25s;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .main-container {
            display: flex;
            min-height: calc(100vh - 64px);
        }

        .left-sidebar {
            width: 220px;
            background: #fff;
            padding: 15px 0;
        }

        .menu-item {
            display: block;
            color: #333;
            padding: 14px 32px;
            text-decoration: none;
            font-size: 16px;
            transition: 0.25s;
            border-left: 4px solid transparent;
            margin-bottom: 4px;
        }

        .menu-item:hover,
        .menu-item.active {
            background: rgba(82, 122, 255, 0.12);
            color: #fff;
            border-left-color: #527aff;
        }

        .right-content {
            flex: 1;
            padding: 0;
            overflow: hidden;
        }

        /* 你的统计卡片容器，初始隐藏 */
        .home-card-wrap {
            padding: 30px;
            display: none;
        }

        .welcome-card {
            background: #fff;
            border-radius: 16px;
            padding: 35px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        }

        .welcome-card h2 {
            color: #0f3460;
            margin-bottom: 12px;
            font-size: 24px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #fff;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            transition: 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            font-size: 32px;
            color: #0f3460;
            margin-bottom: 8px;
        }

        .stat-card p {
            color: #777;
            margin: 0;
        }

        .quick-card {
            background: #fff;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        }

        .quick-card h4 {
            color: #0f3460;
            margin-bottom: 20px;
        }

        .quick-btns {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .quick-btn {
            display: block;
            background: linear-gradient(90deg, #0f3460, #527aff);
            color: #fff;
            text-decoration: none;
            padding: 18px 10px;
            border-radius: 12px;
            text-align: center;
            transition: 0.3s;
        }

        .quick-btn:hover {
            opacity: 0.92;
            transform: translateY(-3px);
        }

        iframe {
            width: 100%;
            height: calc(100vh - 64px);
            border: none;
            display: block;
        }

        @media (max-width: 1200px) {
            .main-container {
                flex-direction: column;
            }

            .left-sidebar {
                width: 100%;
                display: flex;
                flex-wrap: wrap;
                padding: 15px;
            }

            .menu-item {
                padding: 10px 18px;
                border-left: none;
                border-bottom: 2px solid transparent;
            }

            .menu-item:hover {
                border-left: none;
                border-bottom-color: #527aff;
            }

            .stats-grid,
            .quick-btns {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<!-- 外层固定顶部标题 -->
<div class="top-header">
    <div class="header-title">智慧商品信息管理平台</div>
    <div class="user-info">
        <span>当前用户：<span sec:authentication="name"></span></span>
        <a th:href="@{/logout}" class="logout-btn">退出登录</a>
    </div>
</div>

<div class="main-container">
    <!-- 外层固定左侧侧边导航 -->
    <div class="left-sidebar">
        <a id="menu-home" class="menu-item active" href="#">首页</a>
        <a class="menu-item" th:href="@{/product/list}" target="mainIframe">商品管理</a>

        <!-- 仅管理员可见菜单 -->
        <div sec:authorize="hasAuthority('ROLE_admin')">
            <a class="menu-item" th:href="@{/product/add}" target="mainIframe">新增商品</a>
            <a class="menu-item" th:href="@{/category/list}" target="mainIframe">分类管理</a>
        </div>
    </div>

    <!-- 内层区域：iframe + 统计卡片 -->
    <div class="right-content">
        <!-- 你的统计卡片，页面加载默认隐藏 -->
        <div id="homeBox" class="home-card-wrap">
            <div class="welcome-card">
                <h2>👋 欢迎进入商品管理后台</h2>
                <p>请通过左侧菜单管理商品、分类和系统数据。当前页面为系统首页，可查看核心数据概览。</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3>128</h3>
                    <p>商品总数</p>
                </div>
                <div class="stat-card">
                    <h3>16</h3>
                    <p>分类数量</p>
                </div>
                <div class="stat-card">
                    <h3>12</h3>
                    <p>今日新增</p>
                </div>
                <div class="stat-card">
                    <h3>5</h3>
                    <p>系统用户</p>
                </div>
            </div>

            <div class="quick-card">
                <h4>快捷操作</h4>
                <div class="quick-btns">
                    <a class="quick-btn" th:href="@{/product/list}" target="mainIframe">商品列表</a>
                    <div sec:authorize="hasAuthority('ROLE_admin')">
                        <a class="quick-btn" th:href="@{/product/add}" target="mainIframe">新增商品</a>
                        <a class="quick-btn" th:href="@{/category/list}" target="mainIframe">分类管理</a>
                    </div>
                    <a class="quick-btn" th:href="@{/welcome}" target="mainIframe">系统说明</a>
                </div>
            </div>
        </div>

        <!-- 课设要求内联框架，页面加载默认展示，自动加载欢迎页 -->
        <iframe name="mainIframe" th:src="@{/welcome}"></iframe>
    </div>
</div>

<script>
    const homeBox = document.getElementById("homeBox");
    const iframe = document.querySelector("iframe");
    const homeMenu = document.getElementById("menu-home");
    const otherMenus = document.querySelectorAll(".left-sidebar .menu-item:not(#menu-home)");
    // 抓取所有快捷按钮
    const quickBtns = document.querySelectorAll(".quick-btn");

    // 页面刚加载默认状态
    homeBox.style.display = "none";
    iframe.style.display = "block";

    // 左侧【首页】按钮点击
    homeMenu.onclick = function(e){
        e.preventDefault();
        iframe.style.display = "none";
        homeBox.style.display = "block";
    }

    // 左侧商品管理/新增商品等侧边菜单点击
    otherMenus.forEach(item=>{
        item.onclick = function(){
            homeBox.style.display = "none";
            iframe.style.display = "block";
        }
    })

    // 新增：下方快捷操作按钮点击逻辑（解决点不动）
    quickBtns.forEach(btn => {
        btn.onclick = function(){
            homeBox.style.display = "none";
            iframe.style.display = "block";
        }
    })
</script>
</body>
</html>
