<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>商品管理系统 - 欢迎首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            /* 双层渐变背景，高级分层蓝色 */
            background: linear-gradient(150deg, #f8fbff 0%, #e1ecff 50%, #d0e2ff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-wrap {
            width: 94%;
            max-width: 820px;
            background: #ffffff;
            padding: 90px 50px;
            border-radius: 24px;
            /* 多层阴影立体效果 */
            box-shadow: 0 12px 40px rgba(37, 99, 235, 0.13), 0 2px 8px rgba(37, 99, 235, 0.06);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        /* 卡片顶部淡蓝装饰光条 */
        .card-wrap::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, #1d4ed8, #3b82f6, #60a5fa);
        }

        /* 纯CSS绘制立体购物箱LOGO，无emoji永不丢失 */
        .logo-box {
            width: 110px;
            height: 110px;
            margin: 0 auto 36px;
            position: relative;
        }
        .cart-bottom {
            width: 76px;
            height: 56px;
            background: #2563eb;
            border-radius: 10px;
            position: absolute;
            bottom: 8px;
            left: 17px;
        }
        .cart-handle {
            width: 40px;
            height: 8px;
            background: #3b82f6;
            border-radius: 4px;
            position: absolute;
            top: 14px;
            left: 35px;
        }
        .cart-wheel {
            width: 14px;
            height: 14px;
            background: #1d4ed8;
            border-radius: 50%;
            position: absolute;
            bottom: -7px;
        }
        .wheel-left { left: 24px; }
        .wheel-right { right: 24px; }

        .main-title {
            font-size: 34px;
            color: #1e40af;
            letter-spacing: 3px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .split-line {
            width: 160px;
            height: 4px;
            background: linear-gradient(90deg, #2563eb, #60a5fa);
            margin: 0 auto 42px;
            border-radius: 4px;
        }

        .text-desc {
            font-size: 19px;
            color: #374151;
            line-height: 2;
            margin-bottom: 30px;
        }

        /* 功能标签圆角蓝块 */
        .tag-group {
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
        }
        .func-tag {
            padding: 10px 22px;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 999px;
            color: #2563eb;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        /* 鼠标悬浮轻微变色动效 */
        .func-tag:hover {
            background: #2563eb;
            color: white;
        }
    </style>
</head>
<body>
<div class="card-wrap">
    <!-- CSS立体购物车图标 -->
    <div class="logo-box">
        <div class="cart-handle"></div>
        <div class="cart-bottom"></div>
        <div class="cart-wheel wheel-left"></div>
        <div class="cart-wheel wheel-right"></div>
    </div>

    <h1 class="main-title">欢迎进入商品管理系统</h1>
    <div class="split-line"></div>

    <div class="text-desc">
        系统服务已就绪，请使用左侧导航栏完成各类业务操作
    </div>

    <div class="tag-group">
        <div class="func-tag">数据看板</div>
        <div class="func-tag">商品管理</div>
        <div class="func-tag">分类管理</div>
        <div class="func-tag">账号权限</div>
    </div>
</div>
</body>
</html>
